# 宏观事件日历（Weekly trigger 会用 WebSearch 补充最新日期并同步到 Google Calendar）
# 这里只列已知的定期事件类型；具体日期由 agent 在运行时查询
macro_calendar:
  recurring_events:
    - type: FOMC
      frequency: "约每 6 周一次（每年 8 次）"
      impact: "SPY / GLD / 所有股票的 beta 放大器"
      agent_instruction: "每次 Weekly 运行时 WebSearch 下一次 FOMC 日期和市场预期"

    - type: CPI
      frequency: "每月中旬（第 2-3 周）"
      impact: "通胀预期 → 影响债券/科技股估值"
      agent_instruction: "WebSearch 下一次 CPI 公布日期和 consensus"

    - type: NFP (Non-Farm Payrolls)
      frequency: "每月首个周五"
      impact: "就业数据 → 影响 Fed 路径"
      agent_instruction: "WebSearch 下一次 NFP 日期"

    - type: PCE (Fed 偏好的通胀指标)
      frequency: "每月末"
      impact: "Fed 决策核心参考"
      agent_instruction: "WebSearch 下一次 PCE 公布日"

# 日历事件类型（Weekly trigger Phase 7 会同步到 Google Calendar）
# 1. 财报（来自 earnings_calendar）
# 2. 宏观事件（来自 macro_calendar.recurring_events + WebSearch）
# 3. Ad-hoc 事件（扫描中发现：分析师日、产品发布、监管决定、中东冲突等）
# 4. 纪律警告（若某持仓已接近 ATR 止损或财报 gap 触发线）
